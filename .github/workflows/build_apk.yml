name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Create fresh Flutter project in /tmp/build
        run: |
          rm -rf /tmp/build
          flutter create --org com.recoverx.app --project-name recoverx /tmp/build

      # ----- 1. डिफ़ॉल्ट आइकन हटाओ -----
      - name: Remove default icons
        run: |
          rm -f /tmp/build/android/app/src/main/res/mipmap-*/ic_launcher.png
          rm -f /tmp/build/android/app/src/main/res/drawable/ic_launcher_foreground.xml
          rm -f /tmp/build/android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f /tmp/build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      # ----- 2. अपना आइकन बनाओ (लाल-सफ़ेद "R") -----
      - name: Generate custom icon
        run: |
          mkdir -p /tmp/build/android/app/src/main/res/drawable
          mkdir -p /tmp/build/android/app/src/main/res/mipmap-anydpi-v26

          # लाल गोले पर सफ़ेद R
          cat << 'EOF' > /tmp/build/android/app/src/main/res/drawable/ic_launcher_foreground.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#E53935"
                  android:pathData="M54,54m-40,0a40,40 0,1 1,80 0a40,40 0,1 1,-80 0" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M40,72 L40,36 L54,36 Q66,36 66,48 Q60,54 54,54 L66,72 L58,72 L46,56 L40,56 L40,72 Z" />
          </vector>
          EOF

          # लाल बैकग्राउंड
          cat << 'EOF' > /tmp/build/android/app/src/main/res/drawable/ic_launcher_background.xml
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#E53935" />
          </shape>
          EOF

          # एडाप्टिव आइकन XML
          cat << 'EOF' > /tmp/build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      # ----- 3. कस्टम स्टाइल (काली स्प्लैश) -----
      - name: Generate custom styles
        run: |
          cat << 'EOF' > /tmp/build/android/app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

      # ----- 4. अब अपनी बाकी फ़ाइलें कॉपी करो -----
      - name: Copy custom AndroidManifest
        run: |
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml /tmp/build/android/app/src/main/
          fi

      - name: Copy custom build.gradle
        run: |
          if [ -f android/app/build.gradle ]; then
            cp android/app/build.gradle /tmp/build/android/app/
          fi

      - name: Copy native C++ sources
        run: |
          if [ -d android/app/src/main/cpp ]; then
            cp -r android/app/src/main/cpp/* /tmp/build/android/app/src/main/cpp/
          fi

      - name: Copy Kotlin sources
        run: |
          if [ -d android/app/src/main/kotlin ]; then
            cp -r android/app/src/main/kotlin/* /tmp/build/android/app/src/main/kotlin/
          fi

      - name: Copy Flutter lib and pubspec
        run: |
          rm -rf /tmp/build/lib
          cp -r lib /tmp/build/lib
          cp pubspec.yaml /tmp/build/

      - name: Install Flutter dependencies
        working-directory: /tmp/build
        run: flutter pub get

      - name: Build APK (Debug with native)
        working-directory: /tmp/build
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: /tmp/build/build/app/outputs/flutter-apk/app-debug.apk