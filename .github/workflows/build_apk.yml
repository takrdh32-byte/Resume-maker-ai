name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Create fresh Flutter project in /tmp/build
        run: |
          rm -rf /tmp/build
          flutter create --org com.recoverx.app --project-name recoverx /tmp/build

      - name: Copy AndroidManifest
        run: |
          mkdir -p /tmp/build/android/app/src/main
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp -v android/app/src/main/AndroidManifest.xml /tmp/build/android/app/src/main/
          else
            echo "WARNING: AndroidManifest.xml not found in repo"
          fi

      - name: Copy build.gradle
        run: |
          mkdir -p /tmp/build/android/app
          if [ -f android/app/build.gradle ]; then
            cp -v android/app/build.gradle /tmp/build/android/app/
          else
            echo "WARNING: build.gradle not found in repo"
          fi

      - name: Copy C++ files one-by-one (with check)
        run: |
          TARGET="/tmp/build/android/app/src/main/cpp"
          mkdir -p "$TARGET"
          echo "Copying C++ files..."

          for f in CMakeLists.txt native-lib.cpp jpeg_carver.h jpeg_carver.cpp neon_scanner.h neon_scanner.cpp xxhash64.h; do
            SRC="android/app/src/main/cpp/$f"
            if [ -f "$SRC" ]; then
              cp -v "$SRC" "$TARGET/"
            else
              echo "ERROR: Required file $SRC is MISSING in your repo!"
              exit 1
            fi
          done

          echo "All C++ files copied successfully."

      - name: Copy Kotlin sources
        run: |
          TARGET="/tmp/build/android/app/src/main/kotlin"
          mkdir -p "$TARGET"
          if [ -d android/app/src/main/kotlin ]; then
            cp -r android/app/src/main/kotlin/* "$TARGET/"
          else
            echo "WARNING: kotlin folder not found in repo"
          fi

      - name: Copy Flutter lib and pubspec
        run: |
          rm -rf /tmp/build/lib
          cp -r lib /tmp/build/lib
          cp pubspec.yaml /tmp/build/

      - name: Install Flutter dependencies
        working-directory: /tmp/build
        run: flutter pub get

      - name: Build APK (Debug with native)
        working-directory: /tmp/build
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: /tmp/build/build/app/outputs/flutter-apk/app-debug.apk