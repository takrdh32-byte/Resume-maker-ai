name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # सीधे रिपो के रूट में Flutter प्रोजेक्ट सेटअप करो
      # इससे android/ फोल्डर और सभी ज़रूरी Gradle फ़ाइलें बनेंगी
      - name: Create Flutter project in root
        run: flutter create --org com.recoverx.app --project-name recoverx .

      # अब हमारी कस्टम फ़ाइलों को एक-एक करके सही जगह कॉपी करते हैं
      - name: Copy custom AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml 2>/dev/null || true
      # दरअसल हमारी कस्टम मेनिफ़ेस्ट भी android/app/src/main/ में ही होगी (रिपो में)
      # इसलिए पहले ही कॉपी हो चुकी होगी, बस सुनिश्चित करना

      - name: Copy custom build.gradle
        run: cp android/app/build.gradle android/app/build.gradle 2>/dev/null || true

      - name: Copy native C++ sources
        run: cp -r android/app/src/main/cpp/* android/app/src/main/cpp/ 2>/dev/null || true

      - name: Copy Kotlin sources
        run: cp -r android/app/src/main/kotlin/* android/app/src/main/kotlin/ 2>/dev/null || true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK (Debug with native)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk