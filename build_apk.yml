name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Create Flutter project (v2 embedding by default)
        run: flutter create --org com.recoverx.app --project-name recoverx .

      # हर कॉपी से पहले डायरेक्टरी बनाएँ — सबसे सुरक्षित तरीका
      - name: Copy custom AndroidManifest
        run: |
          mkdir -p recoverx/android/app/src/main
          cp android/app/src/main/AndroidManifest.xml recoverx/android/app/src/main/

      - name: Copy custom build.gradle
        run: |
          mkdir -p recoverx/android/app
          cp android/app/build.gradle recoverx/android/app/

      - name: Copy native C++ sources
        run: |
          mkdir -p recoverx/android/app/src/main/cpp
          cp -r android/app/src/main/cpp/* recoverx/android/app/src/main/cpp/

      - name: Copy Kotlin sources
        run: |
          mkdir -p recoverx/android/app/src/main/kotlin
          cp -r android/app/src/main/kotlin/* recoverx/android/app/src/main/kotlin/

      - name: Copy Flutter lib and pubspec
        run: |
          cp -r lib recoverx/
          cp pubspec.yaml recoverx/

      - name: Install Flutter dependencies
        run: cd recoverx && flutter pub get

      - name: Build APK (Debug with native)
        run: cd recoverx && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: recoverx/build/app/outputs/flutter-apk/app-debug.apk