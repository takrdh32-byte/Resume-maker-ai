name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # सबसे साफ़ तरीका: पहले एक नई डायरेक्टरी बनाकर उसमें Flutter प्रोजेक्ट सेटअप करो,
      # फिर अपनी ज़रूरी फाइलें कॉपी करो, और वहीं से बिल्ड करो।
      - name: Create fresh Flutter project in /tmp/build
        run: |
          rm -rf /tmp/build
          flutter create --org com.recoverx.app --project-name recoverx /tmp/build

      # अब हर ज़रूरी फाइल को सही जगह पर कॉपी करते हैं
      - name: Copy custom AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml /tmp/build/android/app/src/main/

      - name: Copy custom build.gradle
        run: cp android/app/build.gradle /tmp/build/android/app/

      - name: Copy native C++ sources
        run: cp -r android/app/src/main/cpp /tmp/build/android/app/src/main/

      - name: Copy Kotlin sources
        run: cp -r android/app/src/main/kotlin /tmp/build/android/app/src/main/

      - name: Copy Flutter lib and pubspec
        run: |
          rm -rf /tmp/build/lib
          cp -r lib /tmp/build/lib
          cp pubspec.yaml /tmp/build/

      - name: Install Flutter dependencies
        working-directory: /tmp/build
        run: flutter pub get

      - name: Build APK (Debug with native)
        working-directory: /tmp/build
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: /tmp/build/build/app/outputs/flutter-apk/app-debug.apk