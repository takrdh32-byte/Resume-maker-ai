name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # नया Flutter प्रोजेक्ट बनाएँ ताकि android/ फोल्डर और Gradle फ़ाइलें आ जाएँ
      - name: Create Flutter Android project
        run: |
          flutter create --org com.recoverx.app --project-name recoverx .
          # तुम्हारे पुराने Dart कोड को इस नए प्रोजेक्ट में रख दो
          cp -r lib/ recoverx/lib/
          cp pubspec.yaml recoverx/
          cd recoverx

      - name: Install Dependencies
        run: cd recoverx && flutter pub get

      - name: Build APK (Debug)
        run: cd recoverx && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: recoverx/build/app/outputs/flutter-apk/app-debug.apk