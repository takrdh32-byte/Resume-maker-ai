name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # एक अस्थायी फोल्डर में नया Flutter प्रोजेक्ट बनाओ
      - name: Create fresh Flutter project
        run: |
          rm -rf /tmp/recoverx_build
          flutter create --org com.recoverx.app --project-name recoverx /tmp/recoverx_build

      # अब अपनी कस्टम फ़ाइलें सही जगह पर कॉपी करो
      - name: Copy custom Android files
        run: |
          # AndroidManifest
          mkdir -p /tmp/recoverx_build/android/app/src/main
          cp -f android/app/src/main/AndroidManifest.xml /tmp/recoverx_build/android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "Using default AndroidManifest"

          # build.gradle
          mkdir -p /tmp/recoverx_build/android/app
          cp -f android/app/build.gradle /tmp/recoverx_build/android/app/build.gradle 2>/dev/null || echo "Using default build.gradle"

          # C++ sources
          mkdir -p /tmp/recoverx_build/android/app/src/main/cpp
          if [ -d android/app/src/main/cpp ]; then
            cp -r android/app/src/main/cpp/* /tmp/recoverx_build/android/app/src/main/cpp/
          else
            echo "Warning: cpp folder not found"
          fi

          # Kotlin sources
          mkdir -p /tmp/recoverx_build/android/app/src/main/kotlin
          if [ -d android/app/src/main/kotlin ]; then
            cp -r android/app/src/main/kotlin/* /tmp/recoverx_build/android/app/src/main/kotlin/
          else
            echo "Warning: kotlin folder not found"
          fi

      - name: Copy Flutter sources
        run: |
          rm -rf /tmp/recoverx_build/lib
          cp -r lib /tmp/recoverx_build/lib
          cp pubspec.yaml /tmp/recoverx_build/

      - name: Install Flutter dependencies
        working-directory: /tmp/recoverx_build
        run: flutter pub get

      - name: Build APK (Debug with native)
        working-directory: /tmp/recoverx_build
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: /tmp/recoverx_build/build/app/outputs/flutter-apk/app-debug.apk