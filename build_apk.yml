name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Create Flutter project
        run: flutter create --org com.recoverx.app --project-name recoverx .

      - name: Copy lib and pubspec
        run: |
          cp -r lib recoverx/
          cp pubspec.yaml recoverx/

      - name: Copy native C++ and Kotlin sources
        run: |
          cp -r android/app/src/main recoverx/android/app/src/
          cp android/app/build.gradle recoverx/android/app/

      - name: Install Flutter dependencies
        run: cd recoverx && flutter pub get

      - name: Build APK (Debug with native)
        run: cd recoverx && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: recoverx/build/app/outputs/flutter-apk/app-debug.apk