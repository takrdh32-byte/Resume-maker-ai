name: Build Debug APK (Real Engine)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # 1. एक साफ़ सब-डायरेक्टरी में Flutter प्रोजेक्ट बनाओ
      - name: Create fresh Flutter project
        run: flutter create --org com.recoverx.app --project-name recoverx ./app_project

      # 2. अब हर डायरेक्टरी पहले बनाकर फिर कॉपी करो
      - name: Copy custom AndroidManifest
        run: |
          mkdir -p app_project/android/app/src/main
          cp android/app/src/main/AndroidManifest.xml app_project/android/app/src/main/

      - name: Copy custom build.gradle
        run: |
          mkdir -p app_project/android/app
          cp android/app/build.gradle app_project/android/app/

      - name: Copy native C++ sources
        run: |
          mkdir -p app_project/android/app/src/main/cpp
          cp -r android/app/src/main/cpp/* app_project/android/app/src/main/cpp/

      - name: Copy Kotlin sources
        run: |
          mkdir -p app_project/android/app/src/main/kotlin
          cp -r android/app/src/main/kotlin/* app_project/android/app/src/main/kotlin/

      # 3. Flutter फ़ाइलें (lib और pubspec) — पूरा lib फोल्डर कॉपी करें, pubspec भी
      - name: Copy Flutter sources
        run: |
          rm -rf app_project/lib
          cp -r lib app_project/lib
          cp pubspec.yaml app_project/

      - name: Install Flutter dependencies
        run: cd app_project && flutter pub get

      - name: Build APK (Debug with native)
        run: cd app_project && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recoverx-debug-apk
          path: app_project/build/app/outputs/flutter-apk/app-debug.apk